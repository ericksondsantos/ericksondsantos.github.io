<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />

        <link rel="icon" type="image/png" href="./Images/profile.png">

<body>
    <div class="gameContainer">
        <div class="feedback" id="feedback"></div>
        <h2>Fill up the sky with stars!</h2>
        <div class="statsContainer">
            <div class="stats"><span class="score" id="score">0</span><br>Score<br></div>
            <div class="stats"><span class="streak" id="streak">0</span><br>Streak<br></div>
        </div>
        <div class="equation" id="equation">---</div>
        <form id="gameForm" onsubmit="checkAnswer(event)">
            <div class="inputContainer">
                <button class="submitBtn" type="submit">&#x27A4</button>
                <input type="number" id="userAnswer" placeholder="..." required autocomplete="off">
                <button class="randomizeBtn" id="nextBtn" onclick="generateEquation()">&#x21BB</button>
            </div>
        </form>
    </div>
