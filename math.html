<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Math Game</title>
        <link rel="icon" type="image/png" href="./Images/profile.png">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Lilita+One&display=swap" rel="stylesheet">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65" crossorigin="anonymous">
        <link rel="stylesheet" href="math-style.css">
    </head>
    <style>
        body {
            background: linear-gradient(190deg, #1A05A2, #8F0177);
        }
        h6 {
            color: #ffff;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
        }
    </style>
<body>
    <div class="game-container">
        <h6>Keep playing to fill up the sky with stars!</h6>
        <div class="feedback" id="feedback"></div>
        <div class="stats-container">
            <div class="stats">Score <span id="score" class="score">0</span></div>
            <div class="stats">Streak <span id="streak" class="streak">0</span></div>
        </div>
        <div class="equation" id="equation">---</div>
        <form id="game-form" onsubmit="checkAnswer(event)">
            <div class="input-section">
                <input type="number" id="user-answer" placeholder="Answer" required autocomplete="off">
            </div>
            <div class="button-container">
                <button type="submit" class="submit-btn">Submit</button>
                <button class="randomize-btn" id="next-btn" onclick="generateEquation()">Randomize</button>
            </div>
        </form>
    </div>
    <iframe width="100%" height="166" scrolling="no" frameborder="no" allow="autoplay; encrypted-media" src="https://w.soundcloud.com/player/?url=https%3A//api.soundcloud.com/tracks/soundcloud%253Atracks%253A2339129783&color=%23ff5500&auto_play=true&hide_related=false&show_comments=true&show_user=true&show_reposts=false&show_teaser=true"></iframe>
    <footer class="footer" id="contact">
      <div class="bottom-container">
        <a class="footer-link" href="https://www.linkedin.com/in/ericksondsantos/">LinkedIn</a> | 
        <a class="footer-link" href="mailto:ericksondsantos@gmail.com">Email</a> | 
        <a class="footer-link" href="https://ericksondsantos.github.io/">Website</a> | 
        <a class="footer-link" href="https://ericksondsantos.github.io/math.html">Math Game</a>
        <p class="copyright">“Nothing is more difficult, and therefore more precious, than to be able to decide.” -Napoleon Bonaparte</p>
      </div>
    </footer>
<script src="/math.js"></script>
