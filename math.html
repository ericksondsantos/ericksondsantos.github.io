<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Math Game</title>
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:ital,wght@0,100..700;1,100..700&display=swap" rel="stylesheet">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65" crossorigin="anonymous">
        <link rel="stylesheet" href="style.css">
    </head>
<body>
    <div class="game-container">
        <div class="stats-container">
            <div class="stats">Score <span id="score" class="score">0</span></div>
            <div class="stats">Streak <span id="streak" class="streak">0</span></div>
        </div>
        <div class="equation" id="equation">---</div>
        <form id="game-form" onsubmit="checkAnswer(event)">
            <div class="input-section">
                <input type="number" id="user-answer" placeholder="Answer" required autocomplete="off">
            </div>
            <div class="button-container">
                <button type="submit" class="submit-btn">Submit</button>
                <button class="randomize-btn" id="next-btn" onclick="generateEquation()">Randomize</button>
            </div>
            <div class="feedback" id="feedback"></div>
        </form>
    </div>
    <footer class="footer" id="contact">
      <div class="bottom-container">
        <a class="footer-link" href="https://www.linkedin.com/in/ericksondsantos/">LinkedIn</a> | 
        <a class="footer-link" href="mailto:ericksondsantos@gmail.com">Email</a> | 
        <a class="footer-link" href="https://ericksondsantos.github.io/">Website</a> | 
        <a class="footer-link" href="https://ericksondsantos.github.io/math.html">Math Game</a>
        <p class="copyright">“Nothing is more difficult, and therefore more precious, than to be able to decide.” -Napoleon Bonaparte</p>
      </div>
    </footer>
<script>
        // Game State Variables
        let currentAnswer = 0;
        let score = 0;
        let streak = 0;

        // DOM Elements
        const equationEl = document.getElementById('equation');
        const userAnswerEl = document.getElementById('user-answer');
        const feedbackEl = document.getElementById('feedback');
        const scoreEl = document.getElementById('score');
        const streakEl = document.getElementById('streak');

        // Helper function to get random integer
        function getRandomInt(min, max) {
            return Math.floor(Math.random() * (max - min + 1)) + min;
        }

        // Generate a new random math equation
        function generateEquation() {
            // Clear previous feedback and input
            feedbackEl.textContent = '';
            userAnswerEl.value = '';
            userAnswerEl.focus();

            const operators = ['+', '-', '×', '÷'];
            const operator = operators[Math.floor(Math.random() * operators.length)];
            
            let num1, num2;

            switch(operator) {
                case '+':
                    num1 = getRandomInt(5, 100);
                    num2 = getRandomInt(5, 100);
                    currentAnswer = num1 + num2;
                    break;
                case '-':
                    // Ensure results aren't frustratingly negative for a casual game
                    num1 = getRandomInt(10, 100);
                    num2 = getRandomInt(5, num1); 
                    currentAnswer = num1 - num2;
                    break;
                case '×':
                    num1 = getRandomInt(2, 12);
                    num2 = getRandomInt(2, 12);
                    currentAnswer = num1 * num2;
                    break;
                case '÷':
                    // Prevent decimals: Generate answer and num2 first, then multiply to get num1
                    num2 = getRandomInt(2, 10);
                    currentAnswer = getRandomInt(2, 10);
                    num1 = num2 * currentAnswer;
                    break;
            }

            // Display the equation to the user
            equationEl.textContent = `${num1} ${operator} ${num2}`;
        }

        // Check if the user's answer is correct
        function checkAnswer(event) {
            event.preventDefault(); // Prevents page reload on form submit

            // If an equation hasn't been generated yet
            if (equationEl.textContent === '---') {
                feedbackEl.textContent = "Click 'Randomize' first!";
                feedbackEl.className = "feedback incorrect";
                return;
            }

            const userAnswer = parseInt(userAnswerEl.value, 10);

            if (userAnswer === currentAnswer) {
                feedbackEl.textContent = "Good job!";
                feedbackEl.className = "feedback correct";
                score += 10;
                streak++;
                scoreEl.textContent = score;
                streakEl.textContent = streak;
                
                // Automatically auto-advance to next question after a brief delay
                setTimeout(generateEquation, 1200);
            } else {
                feedbackEl.textContent = `Try again!`;
                feedbackEl.className = "feedback incorrect";
                streak = 0;
                streakEl.textContent = streak;
                userAnswerEl.select(); // Highlight user input for easy correction
            }
        }

        // Initialize the first question when the page loads
        window.onload = generateEquation;
</script>
